columns_to_drop:
  - PassengerId
  - Name
  - Ticket
  - Cabin
  - Survived

target_col: Survived

numerical_features:
  - Age
  - Fare
  - SibSp
  - Parch

categorical_features:
  - Pclass
  - Sex
  - Embarked

numerical_pipeline:
  imputer_strategy: median
  scaler: standard

categorical_pipeline:
  imputer_strategy: constant
  encoder: onehot