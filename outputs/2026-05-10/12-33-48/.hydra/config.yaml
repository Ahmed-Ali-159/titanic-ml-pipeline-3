model:
  name: random_forest
  n_estimators: 300
training:
  test_size: 0.2
  output_dir: models/
preprocessing:
  columns_to_drop:
  - PassengerId
  - Name
  - Ticket
  - Cabin
  - Survived
  target_col: Survived
  numerical_features:
  - Age
  - Fare
  - SibSp
  - Parch
  categorical_features:
  - Pclass
  - Sex
  - Embarked
  numerical_pipeline:
    imputer_strategy: median
    scaler: standard
  categorical_pipeline:
    imputer_strategy: constant
    encoder: onehot
data:
  train_path: data/raw/train.csv
  test_path: data/raw/test.csv
random_state: 42
